name: job-watch
on:
  schedule:
    - cron: "0 7,16 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run poller
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          REED_KEY: ${{ secrets.REED_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python3 job_watch.py
      - name: Save state
        run: |
          git config user.name "job-watch"
          git config user.email "bot@localhost"
          git add seen_jobs.json matches.csv || true
          git commit -m "update seen jobs" || echo "nothing to commit"
          git push || echo "nothing to push"
